version: '3.8'

services:
  app:
    build:
      context: .
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - joplin-data:/app/data
    environment:
      # - JOPLIN_SERVER_URL=${JOPLIN_SERVER_URL}
      # - JOPLIN_USERNAME=${JOPLIN_USERNAME}
      # - JOPLIN_PASSWORD=${JOPLIN_PASSWORD}
      # - JOPLIN_MASTER_PASSWORD=${JOPLIN_MASTER_PASSWORD}
      # - OLLAMA_URL=${OLLAMA_URL}
      # - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - SQLITE_DB_PATH=/app/data/vector_memory.sqlite
      - REDIS_URL=${REDIS_URL:-redis://:joplin_redis@redis:6379}
    restart: unless-stopped

  # Note on Redis Usage:
  # The purpose of Redis is to maintain a persistent, fast connection to the Joplin server
  # on our internal Docker net across container reboots. We are not responsible for how Redis 
  # handles storing passwords. We are implementing it as per Redis recommendations, explicitly 
  # transferring the risk of password caching/storage from our project to theirs. We do not 
  # store passwords on disk; Redis does.
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass "joplin_redis"
    profiles: ["redis"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  joplin-data:
  redis_data: