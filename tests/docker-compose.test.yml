version: '3.8'
services:
  app:
    build:
      context: .
    ports:
    - "127.0.0.1:3001:3000"
    - "127.0.0.1:8002:8000"
    volumes:
    - test_data:/app/data
    environment:
    - OLLAMA_URL=http://ollama:11434
    - EMBEDDING_MODEL=nomic-embed-text
    - SQLITE_DB_PATH=/app/data/vector_memory.sqlite
    - TEST_MODE_ALLOW_ALL_IPS=true
    - REDIS_URL=${REDIS_URL}
    depends_on:
      ollama:
        condition: service_healthy
      joplin:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl -s -o /dev/null http://127.0.0.1:3000 && curl -s -o /dev/null http://127.0.0.1:8000 || exit 1
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    extra_hosts:
    - host.docker.internal:host-gateway

  # Note on Redis Usage:
  # The purpose of Redis is to maintain a persistent, fast connection to the Joplin server
  # on our internal Docker net across container reboots. We are not responsible for how Redis 
  # handles storing passwords. We are implementing it as per Redis recommendations, explicitly 
  # transferring the risk of password caching/storage from our project to theirs. We do not 
  # store passwords on disk; Redis does.
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass "joplin_redis"
    profiles: ["redis"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    extra_hosts:
    - host.docker.internal:host-gateway

  ollama:
    image: ollama/ollama:latest
    volumes:
    - ollama_data:/root/.ollama
    entrypoint:
    - /bin/sh
    - -c
    - |
      ollama serve &
      # Only pull model if it is not already present to save time and memory
      (timeout 120s /bin/sh -c 'until ollama list >/dev/null 2>&1; do sleep 5; done' && \
       ollama list | grep -q "nomic-embed-text" || ollama pull nomic-embed-text) &
      wait
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - ollama
      - list
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    extra_hosts:
    - host.docker.internal:host-gateway
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
    - POSTGRES_PASSWORD=joplin
    - POSTGRES_USER=joplin
    - POSTGRES_DB=joplin
    volumes:
    - joplin_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U joplin -d joplin
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    extra_hosts:
    - host.docker.internal:host-gateway
  joplin:
    image: joplin/server:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
    - 22300:22300
    restart: unless-stopped
    environment:
    - APP_PORT=22300
    - APP_BASE_URL=http://joplin:22300
    - DB_CLIENT=pg
    - POSTGRES_PASSWORD=joplin
    - POSTGRES_DATABASE=joplin
    - POSTGRES_USER=joplin
    - POSTGRES_PORT=5432
    - POSTGRES_HOST=db
    - RATE_LIMIT_ENABLED=false
    - MAX_LOGIN_ATTEMPTS=99999
    - MAILER_ENABLED=0
    healthcheck:
      test:
      - CMD-SHELL
      - 'node -e "require(''http'').get({host: ''localhost'', port: 22300, path: ''/api/ping'',
        headers: {host: ''joplin:22300''}}, (r) => process.exit(r.statusCode === 200
        ? 0 : 1)).on(''error'', () => process.exit(1))"'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    extra_hosts:
    - host.docker.internal:host-gateway
volumes:
  ollama_data: null
  joplin_data: null
  test_data: null
  redis_data: null
