name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './server/requirements.txt'

      - name: Install Python dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Flake8
        working-directory: ./server
        run: flake8 .

  test-node:
    name: Node.js Tests (${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Jest Tests
        working-directory: ./client
        run: npm run test -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: "./test-results"
          JEST_JUNIT_OUTPUT_NAME: "jest-junit.xml"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results-${{ matrix.node-version }}
          path: client/test-results/jest-junit.xml

  test-python:
    name: Python Tests (${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: './server/requirements.txt'

      - name: Install Python dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
          python -m playwright install chromium

      - name: Run Pytest
        working-directory: ./
        run: |
          python -m pytest server/tests/ tests/ --junitxml=server/test-results/pytest-junit.xml --tracing=retain-on-failure --screenshot=only-on-failure --video=retain-on-failure

      - name: Extract Docker Logs on Failure
        if: failure()
        run: |
          docker compose -p joplin-test-env -f docker-compose.test.yml logs > joplin-test-env-logs.txt || true
          docker compose -p joplin-test-ui -f docker-compose.auth.yml logs > joplin-test-ui-logs.txt || true

      - name: Upload Docker Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.python-version }}
          path: ./*-logs.txt

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.python-version }}
          path: ./test-results/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: server/test-results/pytest-junit.xml

  publish-test-results:
    name: Publish Test Results
    needs: [test-node, test-python]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: github.event_name == 'pull_request'
        with:
          files: "artifacts/**/*.xml"
