version: '3.8'

services:
  app:
    build:
      context: .
    ports:
      - "3002:3000"
      - "8003:8000"
    volumes:
      - test_data:/app/data
    environment:
      - JOPLIN_SERVER_URL=${JOPLIN_SERVER_URL}
      - JOPLIN_USERNAME=${JOPLIN_USERNAME}
      - JOPLIN_PASSWORD=${JOPLIN_PASSWORD}
      - JOPLIN_MASTER_PASSWORD=${JOPLIN_MASTER_PASSWORD}
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - SQLITE_DB_PATH=/app/data/vector_memory.sqlite
    depends_on:
      ollama:
        condition: service_healthy
      joplin:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/http-api/mcp/stateless"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: [ "/bin/sh", "-c", "ollama serve & (timeout 60s /bin/sh -c 'until ollama list >/dev/null 2>&1; do sleep 2; done' && ollama pull nomic-embed-text) & wait" ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 20

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
        - POSTGRES_PASSWORD=joplin
        - POSTGRES_USER=joplin
        - POSTGRES_DB=joplin
    volumes:
        - joplin_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joplin -d joplin"]
      interval: 5s
      timeout: 3s
      retries: 20

  joplin:
    image: joplin/server:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
        - "22301:22300"
    restart: unless-stopped
    environment:
        - APP_PORT=22300
        - APP_BASE_URL=http://localhost:22301
        - DB_CLIENT=pg
        - POSTGRES_PASSWORD=joplin
        - POSTGRES_DATABASE=joplin
        - POSTGRES_USER=joplin
        - POSTGRES_PORT=5432
        - POSTGRES_HOST=db
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:22300/api/ping', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  ollama_data:
  joplin_data:
  test_data: