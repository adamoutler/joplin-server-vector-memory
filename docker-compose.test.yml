version: '3'

services:
    db:
        image: postgres:15
        volumes:
            - type: tmpfs
              target: /var/lib/postgresql/data
        ports:
            - "5432:5432"
        restart: unless-stopped
        environment:
            - POSTGRES_PASSWORD=joplin
            - POSTGRES_USER=joplin
            - POSTGRES_DB=joplin

    app:
        image: joplin/server:latest
        depends_on:
            - db
        ports:
            - "22300:22300"
        restart: unless-stopped
        volumes:
            - type: tmpfs
              target: /tmp
            - type: tmpfs
              target: /home/joplin/packages/server/logs
        environment:
            - APP_PORT=22300
            - APP_BASE_URL=http://localhost:22300
            - DB_CLIENT=pg
            - POSTGRES_PASSWORD=joplin
            - POSTGRES_DATABASE=joplin
            - POSTGRES_USER=joplin
            - POSTGRES_PORT=5432
            - POSTGRES_HOST=db
