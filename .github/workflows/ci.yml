name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional
      - name: Run commitlint
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
          else
            npx commitlint --from HEAD~1 --to HEAD --verbose
          fi

  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './server/requirements.txt'

      - name: Install Python dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Flake8
        working-directory: ./server
        run: flake8 .

  test-node:
    name: Node.js Tests (${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Jest Tests
        working-directory: ./client
        run: npm run test -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: "./test-results"
          JEST_JUNIT_OUTPUT_NAME: "jest-junit.xml"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results-${{ matrix.node-version }}
          path: client/test-results/jest-junit.xml

  test-python:
    name: Python Tests (${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for e2e_workflow node script)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: './server/requirements.txt'

      - name: Add joplin alias to localhost
        run: sudo echo "127.0.0.1 joplin" | sudo tee -a /etc/hosts

      - name: Install Python dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
          python -m playwright install chromium

      - name: Run Pytest (Unit Tests)
        working-directory: ./
        run: |
          python -m pytest --timeout=600 server/tests/test_server.py server/tests/test_config.py server/tests/test_openapi.py server/tests/test_db.py server/tests/test_http_api.py server/tests/test_extreme_friction_deletion.py server/tests/test_fts_hybrid.py --junitxml=server/test-results/pytest-unit.xml

      - name: Run Pytest (Core API & Server E2E)
        working-directory: ./
        run: |
          python -m pytest --timeout=600 server/tests/test_e2e_mcp.py tests/test_ephemeral_joplin.py tests/test_e2e_workflow.py --junitxml=server/test-results/pytest-core.xml --tracing=retain-on-failure --screenshot=only-on-failure --video=retain-on-failure

      - name: Teardown Core Env
        if: always()
        run: docker compose -p joplin-test-env -f docker-compose.test.yml down -v || true

      - name: Run Pytest (Live API E2E)
        working-directory: ./
        run: |
          python -m pytest --timeout=600 tests/test_live_api_e2e.py --junitxml=server/test-results/pytest-live.xml --tracing=retain-on-failure --screenshot=only-on-failure --video=retain-on-failure

      - name: Run Pytest (Auth Flow)
        working-directory: ./
        run: |
          python -m pytest --timeout=600 tests/test_auth_flow.py tests/test_dashboard_auth.py --junitxml=server/test-results/pytest-auth.xml --tracing=retain-on-failure --screenshot=only-on-failure --video=retain-on-failure

      - name: Teardown Auth Env
        if: always()
        run: docker compose -p joplin-test-auth -f docker-compose.auth.yml down -v || true

      - name: Run Pytest (UI Visual)
        working-directory: ./
        run: |
          python -m pytest --timeout=600 tests/test_ui_api_key.py --junitxml=server/test-results/pytest-ui.xml --tracing=retain-on-failure --screenshot=only-on-failure --video=retain-on-failure

      - name: Extract Docker Logs on Failure
        if: failure()
        run: |
          docker compose -p joplin-test-env -f docker-compose.test.yml logs > joplin-test-env-logs.txt || true
          docker compose -p joplin-test-ui -f docker-compose.auth.yml logs > joplin-test-ui-logs.txt || true

      - name: Upload Docker Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.python-version }}
          path: ./*-logs.txt

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.python-version }}
          path: ./test-results/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: server/test-results/*.xml

  publish-test-results:
    name: Publish Test Results
    needs: [test-node, test-python]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: github.event_name == 'pull_request'
        with:
          files: "artifacts/**/*.xml"

  build-container:
    name: Build and Push Container
    needs: [test-node, test-python]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: test-image:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-image:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/joplin-server-vector-memory
          tags: |
            type=raw,value=dev-latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=dev-${{ github.sha }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
