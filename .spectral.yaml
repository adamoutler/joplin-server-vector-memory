extends: ["spectral:oas"]
rules:
  # Examples of strict custom rules for the API
  operation-4xx-response:
    description: Operations must return at least one 4xx response.
    given: $.paths.*[get,post,put,patch,delete]
    severity: warn
    then:
      field: responses
      function: schema
      functionOptions:
        schema:
          type: object
          patternProperties:
            "^4[0-9]{2}$":
              type: object
