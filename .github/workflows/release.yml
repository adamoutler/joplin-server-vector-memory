name: Production Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Optional: Release version override (e.g. 1.0.0). If blank, uses automatic 0.1.<count>'
        required: false
        type: string

permissions: read-all

jobs:
  # Commit linting is explicitly forbidden in this yaml pipeline.
  # It should be handled locally via a commit-msg / pre-commit hook instead.

  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint
        working-directory: ./client
        run: npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './server/requirements.txt'

      - name: Install Python dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Flake8
        working-directory: ./server
        run: flake8 .

  test-node:
    name: Node.js Tests (${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Jest Tests
        working-directory: ./client
        run: npm run test -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: "./test-results"
          JEST_JUNIT_OUTPUT_NAME: "jest-junit.xml"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results-${{ matrix.node-version }}
          path: client/test-results/jest-junit.xml

  test-python:
    name: Python Tests (${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for e2e_workflow node script)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Node Dependencies
        working-directory: ./client
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: './server/requirements.txt'

      - name: Add joplin alias to localhost
        run: sudo echo "127.0.0.1 joplin" | sudo tee -a /etc/hosts

      - name: Install Python dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
          python -m playwright install chromium

      - name: Run Pytest (Unit Tests)
        working-directory: ./
        run: |
          python -m pytest --timeout=600 server/tests/test_server.py server/tests/test_config.py server/tests/test_openapi.py server/tests/test_db.py server/tests/test_http_api.py server/tests/test_extreme_friction_deletion.py server/tests/test_fts_hybrid.py --junitxml=server/test-results/pytest-unit.xml

      - name: Run Pytest (Integration & E2E)
        working-directory: ./
        run: |
          python -m pytest --e2e --timeout=600 server/tests/test_e2e_mcp.py tests/test_ephemeral_joplin.py tests/test_e2e_workflow.py tests/test_live_api_e2e.py tests/test_auth_flow.py tests/test_dashboard_auth.py tests/test_ui_api_key.py --junitxml=server/test-results/pytest-e2e.xml --tracing=retain-on-failure --screenshot=only-on-failure --video=retain-on-failure

      - name: Extract Docker Logs on Failure
        if: failure()
        run: |
          docker compose -p joplin-test-env -f docker-compose.test.yml logs > joplin-test-env-logs.txt || true

      - name: Upload Docker Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.python-version }}
          path: ./*-logs.txt

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.python-version }}
          path: ./test-results/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: server/test-results/*.xml

  publish-test-results:
    name: Publish Test Results
    needs: [test-node, test-python]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: github.event_name == 'pull_request'
        with:
          files: "artifacts/**/*.xml"

  build-container:
    name: Build and Push Production Container
    needs: [test-node, test-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          AUTO_VERSION="0.1.${COUNT}"
          OVERRIDE="${{ github.event.inputs.version_override }}"
          if [ -n "$OVERRIDE" ]; then
            FINAL_VERSION="$OVERRIDE"
          else
            FINAL_VERSION="$AUTO_VERSION"
          fi
          echo "version=${FINAL_VERSION}" >> $GITHUB_OUTPUT
          
          # Generate release notes
          echo "## Production Release Notes" > release_notes.md
          echo "Version: \`${FINAL_VERSION}\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes in this release:" >> release_notes.md
          
          # Try to get changes since last tag, fallback to last 10 commits if no tags exist
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log ${LAST_TAG}..HEAD --pretty=format:"* %s (%h)" >> release_notes.md
          else
            git log -n 10 --pretty=format:"* %s (%h)" >> release_notes.md
          fi
          
          cat release_notes.md >> $GITHUB_STEP_SUMMARY

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/joplin-server-vector-memory
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=Joplin Server Vector Memory
            org.opencontainers.image.description=Production release for v${{ steps.version.outputs.version }}
            org.opencontainers.image.version=v${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}" || true
          git push origin "v${{ steps.version.outputs.version }}" || true
          gh release create "v${{ steps.version.outputs.version }}"             --title "Release v${{ steps.version.outputs.version }}"             --notes-file release_notes.md
